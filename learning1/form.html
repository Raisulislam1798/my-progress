<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fill the form </title>
    <style>
        label{
            display:block;
            margin-bottom: 10px;
        }

        #hoo{
            margin: 15px;

        }


    </style>
</head>
<body>
    <header>

    </header>

    <main>
        <section>
            <h2>fill up the form</h2>
            <label for="your name">your name:
                <input type="text" placeholder  ="your name" id=" your name">
            </label>

            <label for="email">your email:
                <input type="email" name="" id="email"placeholder="your email">
            </label>

            <label for="phone number">your phone:
                <input type="text" placeholder  ="your phone number" id="phone number">
            </label>

            <fieldset>
                <legend>
                    pick one item
                </legend>

                <label for="book">book
                    <input type="radio" name="book" id="book">

                </label>

                <label for="paper">paper
                    <input type="radio" name="book" id="paper">

                </label>


            </fieldset>

            <fieldset>
                <legend >
                    pick your tools
                </legend>

                <label for="pan">pan
                    <input type="checkbox" name="pen" id="pan">
                </label>

                <label for="pencil">pencil
                    <input type="checkbox" name="pen" id="pencil">
                </label>

                <label for="marker">marker
                    <input type="checkbox" name="pen" id="marker">
                </label>
                

            </fieldset>

                <form id="hoo" >

                    <input type="reset" value="reset">
                    <input type="submit" value="submit">

                </form>
        </section>

    </main>

    <footer>

    </footer>


</body>
</html>
